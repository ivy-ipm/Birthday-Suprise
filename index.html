<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XR Utility Suite</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #0a0a0a, #111);
  color: white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  backdrop-filter: blur(10px);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  background: #1e90ff;
  color: white;
  font-size: 16px;
}

button:active {
  opacity: 0.7;
}

.hidden {
  display: none;
}

.toggle {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

input[type="range"] {
  width: 100%;
}

.terminal {
  background: black;
  color: #00ff88;
  font-family: monospace;
  padding: 10px;
  height: 150px;
  overflow-y: auto;
  border-radius: 10px;
  font-size: 12px;
}

.status {
  font-size: 14px;
  line-height: 1.8;
}
</style>
</head>

<body>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard" class="card">
<h2>XR Utility Suite</h2>

<div class="status">
Tracking: ✅<br>
Firmware: ⚠️ Outdated<br>
Integrity: ❌ Risk Detected
</div>

<button onclick="show('mod')">⚙️ Mod Panel</button>
<button onclick="show('injector')">💉 Injector</button>
<button onclick="show('recovery')">🛠 Recovery Tool</button>
</div>

<!-- MOD PANEL -->
<div id="mod" class="card hidden">
<h3>Mod Panel</h3>

<div class="toggle">
<span>FPS Boost</span>
<input type="checkbox">
</div>

<div class="toggle">
<span>Night Vision</span>
<input type="checkbox">
</div>

<div>
<label>Player Scale</label>
<input type="range" min="1" max="200" value="100">
</div>

<button onclick="fakeApplyMods()">Apply Mods</button>
<button onclick="show('dashboard')">Back</button>
</div>

<!-- INJECTOR -->
<div id="injector" class="card hidden">
<h3>File Injector</h3>

<input type="file">
<button onclick="startInjection()">Inject File</button>

<div class="terminal" id="terminal"></div>

<button onclick="show('dashboard')">Back</button>
</div>

<!-- RECOVERY -->
<div id="recovery" class="card hidden">
<h3>Recovery Tool</h3>

<button onclick="runRecovery()">Scan Headset</button>
<div class="terminal" id="recoveryLog"></div>

<button onclick="show('dashboard')">Back</button>
</div>

</div>

<script>
function show(id) {
  document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function log(el, text) {
  el.innerHTML += text + "<br>";
  el.scrollTop = el.scrollHeight;
}

function fakeApplyMods() {
  alert("Mods Applied Successfully ✅");
}

function startInjection() {
  const term = document.getElementById("terminal");
  term.innerHTML = "";

  const steps = [
    "Initializing injector...",
    "Scanning file...",
    "Bypassing security...",
    "Injecting module...",
    "Finalizing...",
    "Injection successful ✅"
  ];

  let i = 0;
  let interval = setInterval(() => {
    log(term, steps[i]);
    i++;
    if (i >= steps.length) clearInterval(interval);
  }, 600);
}

function runRecovery() {
  const logBox = document.getElementById("recoveryLog");
  logBox.innerHTML = "";

  const steps = [
    "Scanning headset...",
    "Detecting issues...",
    "Firmware corrupted ⚠️",
    "Repairing system...",
    "Restoring tracking...",
    "Finalizing...",
    "Headset unbricked / brick prevented ✅"
  ];

  let i = 0;
  let interval = setInterval(() => {
    log(logBox, steps[i]);
    i++;
    if (i >= steps.length) clearInterval(interval);
  }, 700);
}
</script>

</body>
</html>
